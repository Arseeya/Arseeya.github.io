<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>服务暂停 · Arseeya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局变量 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fcf8f0;
            color: #2a2826;
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-image: radial-gradient(ellipse at 20% 40%, rgba(198, 168, 124, 0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 60%, rgba(139, 122, 107, 0.05) 0%, transparent 50%);
        }
        .pause-wrapper {
            max-width: 640px;
            width: 100%;
            background: rgba(255, 252, 245, 0.6);
            backdrop-filter: blur(4px);
            padding: 3rem 2.5rem;
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 20px 60px -20px rgba(42, 40, 38, 0.15);
            border: 1px solid rgba(198, 168, 124, 0.15);
            text-align: center;
        }
        /* ===== 图标与标题 ===== */
        .pause-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .pause-wrapper h1 {
            font-family: 'EB Garamond', serif;
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: #2a2826;
            margin-bottom: 0.5rem;
        }
        .pause-wrapper .service-name {
            display: inline-block;
            background: rgba(198, 168, 124, 0.12);
            padding: 0.1rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #6b5d4f;
            letter-spacing: 0.08em;
            margin-bottom: 1.5rem;
        }
        .pause-wrapper p {
            color: #4a3f39;
            font-size: 1rem;
            max-width: 440px;
            margin: 0 auto 1.2rem;
        }
        .pause-wrapper .reason {
            background: rgba(198, 168, 124, 0.06);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #5a4f48;
            margin: 1.5rem 0;
            border-left: 3px solid #c6a87c;
        }
        /* ===== 倒计时占位 (可后续添加JS) ===== */
        .countdown-placeholder {
            font-family: 'EB Garamond', serif;
            font-size: 1.6rem;
            color: #b8a084;
            margin: 1rem 0 0.5rem;
            letter-spacing: 0.06em;
        }
        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #8b7a6b;
        }
        /* ===== 返回链接 ===== */
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #8b7a6b;
            text-decoration: none;
            border-bottom: 1px dotted rgba(139, 122, 107, 0.3);
            transition: border-color 0.2s;
        }
        .back-link:hover { border-color: #c6a87c; }
        /* ===== 页脚 ===== */
        .pause-footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #8b7a6b;
            letter-spacing: 0.04em;
            border-top: 1px solid rgba(139, 122, 107, 0.1);
            padding-top: 1.5rem;
        }
        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .pause-wrapper { padding: 2rem 1.2rem; }
            .pause-wrapper h1 { font-size: 2.2rem; }
            .pause-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="pause-wrapper">
        <!-- 动态图标 (根据服务变化) -->
        <span class="pause-icon" id="serviceIcon">📖</span>
        
        <h1>服务暂停</h1>
        
        <!-- 动态服务名称 -->
        <span class="service-name" id="serviceName">小说 · 阅读器</span>
        
        <p>
            感谢您的关注与期待。当前服务正在进行必要的维护或内容更新。
        </p>
        
        <div class="reason">
            <strong>📚 原因：</strong><span id="serviceReason">站主专注备考，小说阅读服务临时关闭。</span>
        </div>
        
        <!-- 倒计时占位 (可扩展) -->
        <div class="countdown-placeholder">——</div>
        <div class="countdown-label">预计恢复时间 · 待定</div>
        
        <!-- 返回首页 -->
        <a href="/" class="back-link">← 返回 Arseeya 主页</a>
        
        <div class="pause-footer">
            <span>“让科技变成自然” · 泽尔集团</span>
        </div>
    </div>

    <!-- ===== 动态内容脚本 ===== -->
    <script>
        (function() {
            // 获取 URL 参数 ?service=xxx
            const urlParams = new URLSearchParams(window.location.search);
            const service = urlParams.get('service') || 'novel'; // 默认小说

            // 定义不同服务的配置
            const serviceConfig = {
                novel: {
                    icon: '📖',
                    name: '小说 · 阅读器',
                    reason: '站主专注备考，小说阅读服务临时关闭。'
                },
                download: {
                    icon: '⬇️',
                    name: '下载中心',
                    reason: '资源整理中，下载服务临时关闭。'
                },
                commission: {
                    icon: '✍️',
                    name: '委托服务',
                    reason: '委托订单排期中，暂不接收新委托。'
                },
                world: {
                    icon: '🌍',
                    name: '世界观',
                    reason: '世界观文档更新中，部分内容暂停访问。'
                },
                gate: {
                    icon: '🚪',
                    name: 'Gate 枢纽',
                    reason: '枢纽链接维护中，请稍后再试。'
                }
            };

            // 获取当前服务配置，若不存在则使用默认 (novel)
            const config = serviceConfig[service] || serviceConfig.novel;

            // 更新页面元素
            document.getElementById('serviceIcon').textContent = config.icon;
            document.getElementById('serviceName').textContent = config.name;
            document.getElementById('serviceReason').textContent = config.reason;
        })();
    </script>
</body>
</html>
