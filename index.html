<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>站点维护中 | arseeya.link</title>
    <!-- 使用简洁但现代的风格，完全自包含，无需外部资源 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Inter', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #1a2634;
        }

        /* 主卡片容器 */
        .maintenance-card {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 装饰顶部条 */
        .status-bar {
            height: 8px;
            background: linear-gradient(90deg, #f59e0b, #eab308, #f97316, #ef4444);
            width: 100%;
        }

        /* 内部内容区 */
        .content {
            padding: 2.5rem 2.2rem 3rem 2.2rem;
        }

        /* 图标区域 */
        .icon-area {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .gear-icon {
            background: #fff1e5;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -8px rgba(0, 0, 0, 0.1);
        }

        .gear-icon svg {
            width: 48px;
            height: 48px;
            stroke: #ea580c;
            stroke-width: 1.5;
            fill: none;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #1f2937, #2d3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }

        .domain {
            text-align: center;
            font-family: monospace;
            font-size: 1rem;
            background: #eef2ff;
            display: inline-block;
            width: auto;
            margin: 0 auto 1.5rem auto;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: #2563eb;
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
        }

        .desc {
            text-align: center;
            font-size: 1.08rem;
            line-height: 1.5;
            color: #334155;
            margin: 1rem 0 1.2rem 0;
            font-weight: 450;
        }

        .notice-box {
            background: #fef9e3;
            border-left: 5px solid #f59e0b;
            border-radius: 1.2rem;
            padding: 1.2rem 1.4rem;
            margin: 1.8rem 0 2rem 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        .notice-box p {
            font-size: 0.95rem;
            color: #854d0e;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .notice-box strong {
            font-weight: 600;
        }

        .clock-row {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin: 2rem 0 1.8rem 0;
        }

        .time-block {
            background: #f1f5f9;
            border-radius: 1.5rem;
            padding: 0.6rem 1rem;
            min-width: 80px;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8), 0 3px 8px rgba(0,0,0,0.05);
        }

        .time-number {
            font-size: 2.1rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            color: #0f172a;
            line-height: 1.2;
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: #475569;
        }

        .contact {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px dashed #cbd5e1;
            font-size: 0.85rem;
            color: #4b5563;
        }

        .contact a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #90aeff;
        }

        .contact a:hover {
            color: #1d4ed8;
            border-bottom-style: solid;
        }

        .small-note {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
            color: #6c757d;
        }

        button {
            background: none;
            border: none;
        }

        /* 进度条模拟 */
        .progress-container {
            background: #e2e8f0;
            border-radius: 40px;
            height: 8px;
            width: 100%;
            margin: 1rem 0 0.8rem 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f97316, #eab308);
            width: 68%;
            height: 100%;
            border-radius: 40px;
            animation: subtlePulse 2.2s infinite ease;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.8; width: 68%;}
            50% { opacity: 1; width: 72%;}
            100% { opacity: 0.8; width: 68%;}
        }

        .status-text {
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            color: #475569;
        }

        @media (max-width: 500px) {
            .content {
                padding: 1.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .time-number {
                font-size: 1.6rem;
            }
            .clock-row {
                gap: 0.8rem;
            }
            .time-block {
                min-width: 65px;
                padding: 0.4rem 0.8rem;
            }
        }

        /* 小彩蛋精致感 */
        .footer-grace {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 1.2rem;
        }
    </style>
</head>
<body>

<div class="maintenance-card">
    <div class="status-bar"></div>
    <div class="content">
        <div class="icon-area">
            <div class="gear-icon">
                <!-- 简洁工具/齿轮 SVG ，表示维护状态 -->
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.07.08A10 10 0 0 0 12 17.66a10 10 0 0 0 6.18-2.16l.07-.08Z" />
                    <path d="M12 2v2" />
                    <path d="M12 20v2" />
                    <path d="M4 4l2 2" />
                    <path d="M18 18l2 2" />
                    <path d="M2 12h2" />
                    <path d="M20 12h2" />
                </svg>
            </div>
        </div>
        
        <h1>暂时停止服务</h1>
        <div style="text-align: center;">
            <span class="domain">arseeya.link</span>
        </div>
        
        <p class="desc">
            我们正在对系统进行计划内的升级与优化，<br>以提供更稳定、更流畅的体验。
        </p>
        
        <!-- 通知附加消息 -->
        <div class="notice-box">
            <p>
                📢 <strong>维护窗口：</strong> 预计 2~4 小时内恢复访问，具体进度请关注后续通知。感谢您的耐心与理解！
            </p>
        </div>
        
        <!-- 动态倒计时占位：展示下次预计恢复 (使用静态演示但未来更新风格，代表优雅占位) 实际可显示大概剩余时间 由于无法知道确切时间，做一个估计倒计时 基于当前时间+2h45m演示 让访客感受到预期-->
        <div class="clock-row" id="countdownArea">
            <div class="time-block">
                <div class="time-number" id="hours">--</div>
                <div class="time-label">小时</div>
            </div>
            <div class="time-block">
                <div class="time-number" id="minutes">--</div>
                <div class="time-label">分钟</div>
            </div>
            <div class="time-block">
                <div class="time-number" id="seconds">--</div>
                <div class="time-label">秒</div>
            </div>
        </div>
        
        <!-- 进度指示条 模拟维护进度 -->
        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>
        <div class="status-text">
            <span>⚙️ 后端升级中</span>
            <span>预计完成度 ≈ 68%</span>
        </div>
        
        <div class="contact">
            📧 如有紧急事宜，请联系 <a href="mailto:support@arseeya.link">support@arseeya.link</a><br>
            或关注官方渠道获取最新动态。
        </div>
        <div class="small-note">
            arseeya.link · 服务暂时不可用，我们会尽快归来 🚀
        </div>
        <div class="footer-grace">
            &copy; arseeya 技术团队
        </div>
    </div>
</div>

<script>
    (function() {
        // 设定一个维护结束的目标时间：当前时间 + 2小时 45分钟 ～ 模拟一个合理期待倒计时
        // 为了让不同访客看到相对一致的“剩余维护时间”，但又不需要后端，这里采用基于访客当前时间 + 2小时45分钟作为维护完成预估。
        // 但注意: 如果页面刷新, 会重新从当前时间 + 2h45m 开始倒计时。作为静态占位完全合理友好。
        // 也可以增加 localstorage 来保持一致性，但无伤大雅。这是纯前端模拟友好提醒。
        // 同时将预计恢复时间显示于页面的倒计时区域中。
        
        let targetTime = null;
        
        function initTargetTime() {
            // 检查本地存储是否有保存的维护目标结束时间 (如果用户刷新，继续沿用之前的结束点，更真实)
            const stored = localStorage.getItem('arseeya_maintain_until');
            const now = Date.now();
            if (stored && !isNaN(parseInt(stored))) {
                const parsed = parseInt(stored);
                if (parsed > now) {
                    targetTime = parsed;
                } else {
                    // 过期则重新设定
                    targetTime = now + (2 * 60 * 60 * 1000) + (45 * 60 * 1000); // 2小时45分
                    localStorage.setItem('arseeya_maintain_until', targetTime);
                }
            } else {
                targetTime = now + (2 * 60 * 60 * 1000) + (45 * 60 * 1000);
                localStorage.setItem('arseeya_maintain_until', targetTime);
            }
        }
        
        function updateCountdown() {
            if (!targetTime) {
                initTargetTime();
            }
            const now = Date.now();
            const distance = targetTime - now;
            
            const hoursElem = document.getElementById('hours');
            const minutesElem = document.getElementById('minutes');
            const secondsElem = document.getElementById('seconds');
            
            if (distance <= 0) {
                // 倒计时结束, 可以显示“即将恢复”或者显示0并动态刷新文本
                hoursElem.innerText = '00';
                minutesElem.innerText = '00';
                secondsElem.innerText = '00';
                // 可选：将进度条改成接近100%并展示不同的消息
                const progressFill = document.querySelector('.progress-fill');
                if (progressFill) {
                    progressFill.style.width = '96%';
                    progressFill.style.background = "linear-gradient(90deg, #22c55e, #16a34a)";
                }
                const statusSpan = document.querySelector('.status-text span:first-child');
                if (statusSpan) statusSpan.innerHTML = '✅ 服务即将上线';
                // 不用继续更新或清除倒计时消息，显示0即可
                return;
            }
            
            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            hoursElem.innerText = hours < 10 ? '0' + hours : '' + hours;
            minutesElem.innerText = minutes < 10 ? '0' + minutes : '' + minutes;
            secondsElem.innerText = seconds < 10 ? '0' + seconds : '' + seconds;
            
            // 动态进度条根据消耗的时间比例显示 (维护窗口总长2h45m = 9900秒)
            const totalMaintainMs = 2 * 3600 * 1000 + 45 * 60 * 1000; // 9900000 ms
            const elapsed = totalMaintainMs - distance;
            let percent = (elapsed / totalMaintainMs) * 100;
            percent = Math.min(99, Math.max(5, percent));
            const progressFillElem = document.querySelector('.progress-fill');
            if (progressFillElem) {
                progressFillElem.style.width = percent + '%';
                // 根据百分比改变颜色风格微调
                if (percent > 70) {
                    progressFillElem.style.background = "linear-gradient(90deg, #fbbf24, #f59e0b)";
                } else {
                    progressFillElem.style.background = "linear-gradient(90deg, #f97316, #eab308)";
                }
            }
            // 更新状态文本描述
            const statusTextSpan = document.querySelector('.status-text span:first-child');
            if (statusTextSpan) {
                if (percent < 30) statusTextSpan.innerHTML = '🔧 环境配置中';
                else if (percent < 65) statusTextSpan.innerHTML = '⚙️ 数据优化 & 后端升级';
                else statusTextSpan.innerHTML = '🚀 最后冲刺，即将完成';
            }
            const percentSpan = document.querySelector('.status-text span:last-child');
            if (percentSpan) {
                percentSpan.innerHTML = `预计完成度 ≈ ${Math.floor(percent)}%`;
            }
        }
        
        // 同时添加一个刷新域名的优雅显示以及可手动重置（可选，无干扰）
        function additionalPolish() {
            // 让域名字体更明显，不需要额外操作
            // 如果倒计时归零之后，可重置本地存储? 不自动重置，避免马上重置再次延长。保持用户感知。
            // 但页面会展示归零状态；若管理员真的维护完成，可以手动清除localstorage或修改但不需要，只是前端友好占位。
            // 添加监听 visibility 保证后台tab运行时更新不频繁但不碍事
        }
        
        // 为了更精确的倒计时，每隔1秒刷新一次
        let interval = null;
        function startTimer() {
            if (interval) clearInterval(interval);
            updateCountdown();
            interval = setInterval(updateCountdown, 1000);
        }
        
        // 额外注意如果维护倒计时结束后，显示不同的信息，还可以增加一个刷新提示
        function observeRestore() {
            // 根据目标时间是否过期展示不同的详细卡片文案
            setInterval(() => {
                if (targetTime && Date.now() >= targetTime) {
                    const descElem = document.querySelector('.desc');
                    if (descElem && !descElem.innerHTML.includes('即将恢复')) {
                        descElem.innerHTML = '维护即将完成，服务正在做最后的启动检查。<br>感谢您耐心等候，马上回来！';
                        const noticeBox = document.querySelector('.notice-box p');
                        if (noticeBox && !noticeBox.innerHTML.includes('即将恢复服务')) {
                            noticeBox.innerHTML = '🎉 <strong>维护接近尾声：</strong> 服务正在重启中，预计几分钟内可恢复访问。';
                        }
                        const clockTitle = document.querySelector('.clock-row');
                        if (clockTitle) {
                            // 可以添加一点小装饰
                        }
                        // 避免重复修改
                    }
                    const progressFill = document.querySelector('.progress-fill');
                    if (progressFill && progressFill.style.width !== '100%') {
                        progressFill.style.width = '99%';
                        progressFill.style.background = "linear-gradient(90deg, #22c55e, #15803d)";
                    }
                }
            }, 2000);
        }
        
        // 初次执行
        initTargetTime();
        startTimer();
        observeRestore();
        
        // 可选的: 当用户点击域名字样或者联系邮件无侵入行为，无需操作
        // 额外增加title动态显示倒计时
        function updateTitleTimer() {
            if (!targetTime) return;
            const distance = targetTime - Date.now();
            if (distance <= 0) {
                document.title = "✨ arseeya.link 即将恢复 ✨";
                return;
            }
            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.title = `[维护中] ${hours}h ${minutes}m - arseeya.link`;
        }
        setInterval(updateTitleTimer, 1000);
        updateTitleTimer();
        
        // 优雅降级处理，如果localstorage不可用则不影响体验
        try {
            if (!localStorage.getItem('arseeya_maintain_until')) {
                // 已调用过init无妨
            }
        } catch(e) {
            // 忽略隐私模式，只是没有本地持久时间，仍然从当前时间开始倒计时
            if(!targetTime) {
                targetTime = Date.now() + (2 * 60 * 60 * 1000) + (45 * 60 * 1000);
            }
        }
        
        // 增加鼠标悬浮小趣味: 齿轮旋转一点点
        const gearSvg = document.querySelector('.gear-icon svg');
        if(gearSvg) {
            gearSvg.style.transition = 'transform 0.3s ease';
            gearSvg.addEventListener('mouseenter', () => {
                gearSvg.style.transform = 'rotate(12deg) scale(1.02)';
            });
            gearSvg.addEventListener('mouseleave', () => {
                gearSvg.style.transform = 'rotate(0deg) scale(1)';
            });
        }
        
        // 确保响应式完全自适应
        window.addEventListener('resize', () => {});
    })();
</script>
</body>
</html>
