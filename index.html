<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>站点停运 · Arseeya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-cream: #fcf8f0;
            --color-stone: #8b7a6b;
            --color-charcoal: #2a2826;
            --color-accent-gold: #c6a87c;
            --color-red: #b33a3a;
            --font-serif: 'EB Garamond', 'Times New Roman', serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--color-cream);
            color: var(--color-charcoal);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-image: radial-gradient(ellipse at 20% 40%, rgba(198, 168, 124, 0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 60%, rgba(139, 122, 107, 0.05) 0%, transparent 50%);
        }

        .emergency-wrapper {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 252, 245, 0.7);
            backdrop-filter: blur(4px);
            padding: 3rem 2.5rem;
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 20px 60px -20px rgba(42, 40, 38, 0.15);
            border: 1px solid rgba(198, 168, 124, 0.15);
            text-align: center;
        }

        /* ===== 紧急标识 ===== */
        .emergency-badge {
            display: inline-block;
            background: var(--color-red);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            margin-bottom: 1.5rem;
        }

        /* ===== 主图标 ===== */
        .emergency-icon {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        /* ===== 标题 ===== */
        .emergency-wrapper h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 400;
            color: var(--color-charcoal);
            margin-bottom: 0.5rem;
        }
        .emergency-wrapper h1 .highlight {
            color: var(--color-red);
            font-style: italic;
        }

        /* ===== 说明文字 ===== */
        .emergency-wrapper .reason {
            font-size: 1.05rem;
            color: #4a3f39;
            max-width: 480px;
            margin: 0.5rem auto 1.2rem;
        }
        .emergency-wrapper .detail {
            background: rgba(198, 168, 124, 0.06);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #5a4f48;
            margin: 1.2rem 0;
            border-left: 3px solid var(--color-red);
            text-align: left;
        }
        .emergency-wrapper .detail strong {
            color: var(--color-red);
        }

        /* ===== 预计恢复 ===== */
        .recovery {
            margin: 1.5rem 0 0.5rem;
        }
        .recovery .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-stone);
        }
        .recovery .time {
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--color-charcoal);
            letter-spacing: 0.04em;
        }

        /* ===== 联系与返回 ===== */
        .contact-line {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--color-stone);
        }
        .contact-line a {
            color: var(--color-charcoal);
            text-decoration: none;
            border-bottom: 1px dotted rgba(139, 122, 107, 0.3);
            transition: border-color 0.2s;
        }
        .contact-line a:hover {
            border-color: var(--color-accent-gold);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--color-stone);
            text-decoration: none;
            border-bottom: 1px dotted rgba(139, 122, 107, 0.3);
            transition: border-color 0.2s;
        }
        .back-link:hover {
            border-color: var(--color-accent-gold);
        }

        /* ===== 页脚 ===== */
        .footer-note {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(139, 122, 107, 0.1);
            font-size: 0.75rem;
            color: var(--color-stone);
            letter-spacing: 0.04em;
        }
        .footer-note .quote {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 0.95rem;
            color: var(--color-charcoal);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .emergency-wrapper { padding: 2rem 1.2rem; }
            .emergency-wrapper h1 { font-size: 2.2rem; }
            .emergency-icon { font-size: 3.5rem; }
            .recovery .time { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="emergency-wrapper">
        <!-- 紧急标识 -->
        <span class="emergency-badge">⛔ 紧急停运</span>

        <!-- 主图标 -->
        <span class="emergency-icon">📱</span>

        <!-- 标题 -->
        <h1>
            设备被<span class="highlight">收缴</span>，<br />站点暂停
        </h1>

        <!-- 说明 -->
        <p class="reason">
            由于站主设备被老师收缴，目前无法进行任何运维操作。
        </p>

        <div class="detail">
            <strong>📌 当前状态：</strong> 所有服务（小说、下载、委托等）暂时无法访问。<br />
            <strong>🧑‍🏫 原因：</strong> 上课期间使用手机，设备已被老师代为保管。
        </div>

        <!-- 预计恢复 -->
        <div class="recovery">
            <div class="label">⏳ 预计恢复</div>
            <div class="time">待设备归还后</div>
            <p style="font-size: 0.8rem; color: var(--color-stone); margin-top: 0.2rem;">
                请耐心等待，站主会尽快恢复服务。
            </p>
        </div>

        <!-- 联系 -->
        <div class="contact-line">
            📧 紧急事务请联系 <a href="mailto:arseeya@outlook.com">arseeya@outlook.com</a>
        </div>

        <!-- 返回（保留结构，但实际无内容可回） -->
        <a href="#" class="back-link" style="pointer-events: none; opacity: 0.5;">← 返回首页 (暂不可用)</a>

        <!-- 页脚 -->
        <div class="footer-note">
            <div class="quote">“让科技变成自然” · 泽尔集团</div>
            <p style="margin-top: 0.3rem;">© 2026 Arseeya · 因故停运中</p>
        </div>
    </div>
</body>
</html>
