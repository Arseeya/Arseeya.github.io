<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者后台 - Arseeya</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #1a1a2e;
            color: #eee;
        }
        .login-box, .admin-box {
            background: #16213e;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 0.5rem;
            background: #0f0f1a;
            color: #fff;
            font-size: 1rem;
        }
        button {
            background: #e94560;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #ff6b6b;
        }
        .success {
            background: #0f3b2c;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        .error {
            background: #4a1e2c;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        h2 {
            color: #e94560;
        }
        .novel-list {
            margin-top: 2rem;
        }
        .novel-item {
            background: #0f0f1a;
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // 密码 - 你可以自己修改这个
        const ADMIN_PASSWORD = "woailele03.11";
        
        // 检查是否已登录
        let loggedIn = localStorage.getItem("author_logged_in") === "true";
        
        function render() {
            const app = document.getElementById("app");
            if (!loggedIn) {
                app.innerHTML = `
                    <div class="login-box">
                        <h2>作者登录</h2>
                        <input type="password" id="password" placeholder="请输入密码" />
                        <button onclick="login()">登录</button>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <div class="admin-box">
                        <h2>✍️ 作者后台</h2>
                        <p>欢迎回来，Arseeya</p>
                        <button onclick="logout()" style="background:#333">退出登录</button>
                        
                        <hr style="margin: 2rem 0;" />
                        
                        <h3>发布新小说</h3>
                        <input type="text" id="title" placeholder="小说标题" />
                        <textarea id="content" rows="8" placeholder="小说内容..."></textarea>
                        <button onclick="publishNovel()">发布小说</button>
                        <div id="message"></div>
                        
                        <hr style="margin: 2rem 0;" />
                        
                        <h3>已发布的小说</h3>
                        <div id="novelList" class="novel-list">加载中...</div>
                    </div>
                `;
                loadNovelList();
            }
        }
        
        function login() {
            const pwd = document.getElementById("password").value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem("author_logged_in", "true");
                loggedIn = true;
                render();
            } else {
                alert("密码错误");
            }
        }
        
        function logout() {
            localStorage.removeItem("author_logged_in");
            loggedIn = false;
            render();
        }
        
        async function publishNovel() {
            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;
            const msgDiv = document.getElementById("message");
            
            if (!title || !content) {
                msgDiv.innerHTML = '<div class="error">请填写标题和内容</div>';
                return;
            }
            
            msgDiv.innerHTML = '<div>发布中...</div>';
            
            // 这里通过 GitHub API 上传文件
            try {
                const result = await uploadToGitHub(title, content);
                if (result.success) {
                    msgDiv.innerHTML = '<div class="success">✅ 小说发布成功！稍后刷新 arseeya.link 即可查看</div>';
                    document.getElementById("title").value = "";
                    document.getElementById("content").value = "";
                    loadNovelList();
                } else {
                    msgDiv.innerHTML = '<div class="error">发布失败：' + result.error + '</div>';
                }
            } catch(e) {
                msgDiv.innerHTML = '<div class="error">发布失败：' + e.message + '</div>';
            }
        }
        
        async function uploadToGitHub(title, content) {
            // 生成文件名（用标题+时间戳）
            const filename = `novels/${Date.now()}_${title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_')}.html`;
            const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - Arseeya的小说</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.8;
        }
        h1 { color: #e94560; }
        .back { margin-bottom: 2rem; }
        .back a { color: #e94560; }
    </style>
</head>
<body>
    <div class="back"><a href="/">← 返回首页</a></div>
    <h1>${title}</h1>
    <div>${content.replace(/\n/g, '<br>')}</div>
    <hr>
    <p>© Arseeya</p>
</body>
</html>`;
            
            // 这里需要用 GitHub API，需要你的 token
            // 简化版：先提示需要配置 token
            return { success: false, error: "需要先配置 GitHub Token，请告诉我你的 GitHub 用户名和 Token" };
        }
        
        async function loadNovelList() {
            // 获取已发布的小说列表
            const listDiv = document.getElementById("novelList");
            if (!listDiv) return;
            
            listDiv.innerHTML = '<div>加载中...</div>';
            try {
                // 这里通过 GitHub API 获取 novels 目录下的文件
                const response = await fetch('https://api.github.com/repos/Arseeya/arseeya.github.io/contents/novels');
                if (response.ok) {
                    const files = await response.json();
                    if (files.length === 0) {
                        listDiv.innerHTML = '<div>暂无小说</div>';
                    } else {
                        listDiv.innerHTML = files.map(file => `
                            <div class="novel-item">
                                <a href="/${file.path}" target="_blank" style="color:#e94560">${file.name.replace('.html', '')}</a>
                            </div>
                        `).join('');
                    }
                } else {
                    listDiv.innerHTML = '<div>暂无小说（novels 文件夹还未创建）</div>';
                }
            } catch(e) {
                listDiv.innerHTML = '<div>暂无小说</div>';
            }
        }
        
        render();
    </script>
</body>
</html>
