<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>章节列表 · Arseeya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c1f, #1a1a2e);
            color: #eee;
            min-height: 100vh;
            padding: 1rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-home {
            background: #e94560;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .book-title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e94560, #667eea);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .refresh-btn {
            background: #333;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }
        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .chapter-item {
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .chapter-item:hover {
            background: rgba(255,255,255,0.12);
            transform: translateX(4px);
        }
        .chapter-item h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }
        .reading-view {
            display: none;
        }
        .reading-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .back-list {
            background: #333;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            border: none;
        }
        .font-controls button {
            background: #e94560;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .content-view {
            background: rgba(0,0,0,0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            line-height: 1.8;
            min-height: 60vh;
        }
        .content-view h2 {
            color: #e94560;
            margin-bottom: 1.5rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        .nav-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 0.6rem;
            border-radius: 2rem;
            cursor: pointer;
            flex: 1;
        }
        .nav-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .error-box {
            background: rgba(233,69,96,0.2);
            border: 1px solid #e94560;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <a href="https://arseeya.github.io" class="back-home">← 返回首页</a>
        <span class="book-title" id="bookTitle">加载中...</span>
        <button class="refresh-btn" id="refreshBtn">⟳ 刷新</button>
    </div>

    <div id="listView">
        <div id="chapterList" class="chapter-list">加载中...</div>
    </div>

    <div id="readingView" class="reading-view">
        <div class="reading-header">
            <button class="back-list" id="backToListBtn">← 返回目录</button>
            <div class="font-controls">
                <button id="fontMinus">A-</button>
                <button id="fontPlus">A+</button>
            </div>
        </div>
        <div class="content-view" id="contentView">
            <h2 id="chapterTitle"></h2>
            <div id="chapterContent"></div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">上一章</button>
            <button class="nav-btn" id="nextBtn">下一章</button>
        </div>
    </div>

    <footer>© Arseeya. All Rights Reserved</footer>
</div>

<script>
    // 获取书名 - 从当前路径最后一级目录名提取
    let bookName = '';
    const pathParts = window.location.pathname.split('/').filter(p => p);
    if (pathParts.length >= 2) {
        bookName = pathParts[pathParts.length - 2];
    }
    document.getElementById('bookTitle').innerHTML = `📖 ${bookName}`;
    document.title = `${bookName} · Arseeya`;

    let chapters = [];
    let currentIndex = -1;
    let fontSize = 18;

    const listView = document.getElementById('listView');
    const readingView = document.getElementById('readingView');
    const chapterListDiv = document.getElementById('chapterList');

    function saveProgress(idx) {
        localStorage.setItem(`reading_${bookName}`, JSON.stringify({ idx, fontSize }));
    }

    function loadProgress() {
        try {
            const saved = JSON.parse(localStorage.getItem(`reading_${bookName}`));
            if (saved && typeof saved.idx === 'number') {
                if (saved.fontSize) fontSize = saved.fontSize;
                return saved.idx;
            }
        } catch(e) {}
        return -1;
    }

    async function loadChapter(idx) {
        if (idx < 0 || idx >= chapters.length) return;
        currentIndex = idx;
        const ch = chapters[idx];
        try {
            const res = await fetch(ch.url);
            if (!res.ok) throw new Error();
            const text = await res.text();
            const lines = text.split('\n');
            const title = lines[0].trim() || ch.name;
            let content = lines.slice(1).join('\n').trim() || '暂无内容';
            content = content.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/\n/g, '<br>');
            document.getElementById('chapterTitle').innerHTML = title;
            document.getElementById('chapterContent').innerHTML = content;
            document.getElementById('contentView').style.fontSize = fontSize + 'px';
            document.getElementById('prevBtn').disabled = (idx <= 0);
            document.getElementById('nextBtn').disabled = (idx >= chapters.length - 1);
            saveProgress(idx);
        } catch(e) {
            document.getElementById('chapterTitle').innerHTML = '加载失败';
            document.getElementById('chapterContent').innerHTML = '无法读取章节内容，请重试。';
        }
    }

    function showReading(idx) {
        listView.style.display = 'none';
        readingView.style.display = 'block';
        loadChapter(idx);
    }

    function showList() {
        listView.style.display = 'block';
        readingView.style.display = 'none';
    }

    async function fetchChapters() {
        chapterListDiv.innerHTML = '<div class="chapter-item">📡 加载中...</div>';
        const folderPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const apiUrl = `https://api.github.com/repos/Arseeya/arseeya.github.io/contents${folderPath}`;
        
        try {
            const res = await fetch(apiUrl);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const files = await res.json();
            const txtFiles = files.filter(f => f.name.endsWith('.txt') && f.name !== '.gitkeep');
            txtFiles.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
            
            if (txtFiles.length === 0) {
                chapterListDiv.innerHTML = '<div class="error-box">📭 暂无章节文件，请在 novels 文件夹中上传 .txt 文件</div>';
                return;
            }
            
            chapters = txtFiles.map(f => ({
                name: f.name.replace('.txt', ''),
                url: f.download_url
            }));
            
            chapterListDiv.innerHTML = chapters.map((ch, i) => `
                <div class="chapter-item" data-idx="${i}">
                    <h3>📄 ${ch.name}</h3>
                    <p>点击开始阅读</p>
                </div>
            `).join('');
            
            document.querySelectorAll('.chapter-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.getAttribute('data-idx'));
                    showReading(idx);
                });
            });
            
            const savedIdx = loadProgress();
            if (savedIdx >= 0 && savedIdx < chapters.length) {
                if (confirm('是否继续上次阅读进度？')) {
                    showReading(savedIdx);
                }
            }
        } catch(err) {
            console.error(err);
            chapterListDiv.innerHTML = `<div class="error-box">⚠️ 加载失败：${err.message}<br><button onclick="fetchChapters()" style="margin-top:1rem; background:#e94560; border:none; color:white; padding:0.5rem 1rem; border-radius:2rem;">重试</button></div>`;
        }
    }

    document.getElementById('backToListBtn').addEventListener('click', showList);
    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) loadChapter(currentIndex - 1); });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < chapters.length - 1) loadChapter(currentIndex + 1); });
    document.getElementById('fontMinus').addEventListener('click', () => { fontSize = Math.max(14, fontSize - 2); document.getElementById('contentView').style.fontSize = fontSize + 'px'; if (currentIndex >= 0) saveProgress(currentIndex); });
    document.getElementById('fontPlus').addEventListener('click', () => { fontSize = Math.min(28, fontSize + 2); document.getElementById('contentView').style.fontSize = fontSize + 'px'; if (currentIndex >= 0) saveProgress(currentIndex); });
    document.getElementById('refreshBtn').addEventListener('click', fetchChapters);

    fetchChapters();
</script>
</body>
</html>
