<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>下载中心 · Arseeya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c1f, #1a1a2e);
            color: #eee;
            min-height: 100vh;
            padding: 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .navbar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .navbar a {
            color: #ddd;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .navbar a:hover {
            background: #e94560;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        .version {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        .desc {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: #ccc;
        }
        .btn {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #c5314b;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #aaa;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
        }
        footer a:hover {
            color: #e94560;
        }
        .error-msg {
            background: rgba(233,69,96,0.2);
            border: 1px solid #e94560;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="https://arseeya.github.io/novels/%E5%90%AC%E6%BD%AE%E4%BA%8B%E8%AE%B0/">作品</a>
        <a href="world.html">百科</a>
        <a href="download.html">下载</a>
    </div>

    <h1 style="text-align:center; margin-bottom:0.5rem;">📦 下载中心</h1>
    <p style="text-align:center; color:#aaa; margin-bottom:1rem;">Android App 及其它资源</p>

    <div id="appsGrid" class="grid">加载中...</div>

    <footer>
        © Arseeya. All Rights Reserved | <a href="terms.html">📜 完整条款</a>
    </footer>
</div>

<script>
    async function loadDownloads() {
        const grid = document.getElementById('appsGrid');
        try {
            const res = await fetch('download.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            
            if (!data.apps || data.apps.length === 0) {
                grid.innerHTML = '<div class="card">暂无 App，敬请期待。</div>';
                return;
            }
            
            const baseUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
            
            grid.innerHTML = data.apps.map(app => {
                const downloadUrl = `${baseUrl}downloads/apps/${encodeURIComponent(app.filename)}`;
                return `
                    <div class="card">
                        <h3>📱 ${app.name}</h3>
                        <div class="version">版本 ${app.version} | ${app.size}</div>
                        <div class="desc">${app.description || ''}</div>
                        <a href="${downloadUrl}" class="btn" download="${app.filename}">⬇️ 下载 APK</a>
                    </div>
                `;
            }).join('');
        } catch(e) {
            console.error(e);
            grid.innerHTML = `<div class="error-msg">⚠️ 加载失败：${e.message}<br><br><button onclick="location.reload()" style="background:#e94560; border:none; color:white; padding:0.5rem 1.2rem; border-radius:2rem; cursor:pointer;">重试</button></div>`;
        }
    }
    
    loadDownloads();
</script>
</body>
</html>
